<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4ff;font-family:'Outfit',sans-serif;padding:20px;}
  .card{width:460px;background:#fff;border-radius:28px;padding:36px;box-shadow:0 4px 6px rgba(0,0,0,0.04),0 20px 50px rgba(0,0,0,0.1);}
  h1{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
  .sub{color:#aaa;font-size:13px;margin-bottom:28px;}
  .amount-section{margin-bottom:20px;}
  label{display:block;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .amount-input{display:flex;align-items:center;background:#f8f9ff;border:2px solid #eef0ff;border-radius:14px;overflow:hidden;transition:border 0.2s;}
  .amount-input:focus-within{border-color:#4f46e5;}
  .currency-flag{padding:12px 16px;font-size:24px;}
  .amount-input input{flex:1;border:none;background:none;font-family:'Outfit';font-size:22px;font-weight:600;color:#1a1a1a;outline:none;padding:12px 0;}
  .currency-select{background:#eef0ff;border:none;font-family:'Outfit';font-size:15px;font-weight:600;color:#4f46e5;padding:12px 16px;cursor:pointer;outline:none;border-left:1px solid #dde0ff;}
  .swap-wrap{display:flex;justify-content:center;margin:12px 0;}
  .swap-btn{width:42px;height:42px;border-radius:50%;background:#4f46e5;border:none;color:#fff;font-size:18px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(79,70,229,0.3);}
  .swap-btn:hover{transform:rotate(180deg);box-shadow:0 6px 20px rgba(79,70,229,0.4);}
  .result-box{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:16px;padding:20px 24px;margin-bottom:24px;color:#fff;}
  .result-label{font-size:13px;opacity:0.7;margin-bottom:8px;}
  .result-amount{font-size:36px;font-weight:700;margin-bottom:4px;}
  .result-rate{font-size:13px;opacity:0.6;}
  .popular{margin-bottom:8px;}
  .popular h3{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .rate-card{background:#f8f9ff;border-radius:12px;padding:12px 14px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;}
  .rate-card:hover{background:#eef0ff;border-color:#c7d2fe;}
  .rate-flag{font-size:18px;margin-bottom:4px;}
  .rate-pair{font-size:12px;color:#888;font-weight:500;}
  .rate-val{font-size:15px;font-weight:700;color:#1a1a1a;}
  .updated{text-align:center;font-size:11px;color:#ccc;margin-top:4px;}
</style>
</head>
<body>
<div class="card">
  <h1>💱 Currency Converter</h1>
  <p class="sub">Real-time currency conversion</p>
  <div class="amount-section">
    <label>Amount</label>
    <div class="amount-input">
      <span class="currency-flag" id="fromFlag">🇺🇸</span>
      <input type="number" id="fromAmt" value="1" min="0" oninput="convert()">
      <select id="fromCur" class="currency-select" onchange="convert()">
        <option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option>
        <option value="INR">INR</option><option value="JPY">JPY</option><option value="CAD">CAD</option>
        <option value="AUD">AUD</option><option value="CNY">CNY</option><option value="SGD">SGD</option>
        <option value="AED">AED</option><option value="CHF">CHF</option><option value="MYR">MYR</option>
      </select>
    </div>
  </div>
  <div class="swap-wrap"><button class="swap-btn" onclick="swap()">⇅</button></div>
  <div class="amount-section">
    <label>Converted To</label>
    <div class="amount-input">
      <span class="currency-flag" id="toFlag">🇮🇳</span>
      <input type="number" id="toAmt" readonly style="color:#4f46e5">
      <select id="toCur" class="currency-select" onchange="convert()">
        <option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option>
        <option value="INR" selected>INR</option><option value="JPY">JPY</option><option value="CAD">CAD</option>
        <option value="AUD">AUD</option><option value="CNY">CNY</option><option value="SGD">SGD</option>
        <option value="AED">AED</option><option value="CHF">CHF</option><option value="MYR">MYR</option>
      </select>
    </div>
  </div>
  <div class="result-box">
    <div class="result-label" id="rateLabel">1 USD = ? INR</div>
    <div class="result-amount" id="resultAmt">—</div>
    <div class="result-rate" id="inverseRate"></div>
  </div>
  <div class="popular">
    <h3>Popular Rates (Base: USD)</h3>
    <div class="rate-grid" id="rateGrid"></div>
  </div>
  <div class="updated" id="updated"></div>
</div>
<script>
const RATES={USD:1,EUR:0.92,GBP:0.79,INR:83.47,JPY:149.8,CAD:1.36,AUD:1.53,CNY:7.24,SGD:1.34,AED:3.67,CHF:0.89,MYR:4.71};
const FLAGS={USD:'🇺🇸',EUR:'🇪🇺',GBP:'🇬🇧',INR:'🇮🇳',JPY:'🇯🇵',CAD:'🇨🇦',AUD:'🇦🇺',CNY:'🇨🇳',SGD:'🇸🇬',AED:'🇦🇪',CHF:'🇨🇭',MYR:'🇲🇾'};
const POPULAR=[['USD','EUR'],['USD','GBP'],['USD','INR'],['USD','JPY']];

function convert(){
  const from=document.getElementById('fromCur').value;
  const to=document.getElementById('toCur').value;
  const amt=parseFloat(document.getElementById('fromAmt').value)||0;
  const rate=RATES[to]/RATES[from];
  const result=amt*rate;
  document.getElementById('toAmt').value=result.toFixed(2);
  document.getElementById('fromFlag').textContent=FLAGS[from];
  document.getElementById('toFlag').textContent=FLAGS[to];
  document.getElementById('rateLabel').textContent=`1 ${from} =`;
  document.getElementById('resultAmt').textContent=`${rate.toFixed(4)} ${to}`;
  document.getElementById('inverseRate').textContent=`1 ${to} = ${(1/rate).toFixed(4)} ${from}`;
  document.getElementById('updated').textContent='Rates updated: '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function swap(){
  const fc=document.getElementById('fromCur').value,tc=document.getElementById('toCur').value;
  document.getElementById('fromCur').value=tc;document.getElementById('toCur').value=fc;
  convert();
}

function renderPopular(){
  document.getElementById('rateGrid').innerHTML=POPULAR.map(([f,t])=>{
    const r=(RATES[t]/RATES[f]).toFixed(4);
    return `<div class="rate-card" onclick="setQuick('${f}','${t}')">
      <div class="rate-flag">${FLAGS[f]}→${FLAGS[t]}</div>
      <div class="rate-pair">${f}/${t}</div>
      <div class="rate-val">${r}</div>
    </div>`;
  }).join('');
}

function setQuick(f,t){document.getElementById('fromCur').value=f;document.getElementById('toCur').value=t;document.getElementById('fromAmt').value=1;convert();}

renderPopular();convert();
</script>
</body>
</html>
